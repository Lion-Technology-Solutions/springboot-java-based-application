<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My bookings | LionTech Resorts</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="site-header">
    <a class="brand" th:href="@{/}">LionTech Resorts</a>
    <nav>
        <a th:href="@{/rooms}">Rooms</a>
        <a th:href="@{/facilities}">Facilities</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/rooms}">Admin</a>
    </nav>
</header>
<main class="page-shell">
    <div class="page-title">
        <p class="eyebrow">Guest portal</p>
        <h1>My bookings</h1>
        <p class="success" th:if="${successMessage}" th:text="${successMessage}">Success</p>
        <p class="error" th:if="${errorMessage}" th:text="${errorMessage}">Error</p>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Reference</th>
                <th>Room</th>
                <th>Dates</th>
                <th>Total</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="booking : ${bookings}">
                <td th:text="${booking.reference}">LTR</td>
                <td th:text="${booking.room.name}">Room</td>
                <td th:text="${booking.checkInDate + ' to ' + booking.checkOutDate}">Dates</td>
                <td th:text="${booking.currency + ' ' + booking.totalAmount}">USD 658</td>
                <td><span class="status-pill" th:text="${booking.status}">CONFIRMED</span></td>
                <td>
                    <a th:if="${booking.status.name() == 'PENDING_PAYMENT'}" th:href="@{/checkout/{reference}(reference=${booking.reference})}">Pay now</a>
                    <form th:if="${booking.status.name() == 'CONFIRMED'}" th:action="@{/account/bookings/{reference}/checkout-stay(reference=${booking.reference})}" method="post" class="inline-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="link-button" type="submit">Checkout stay</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(bookings)}">
                <td colspan="6">No bookings yet. <a th:href="@{/rooms}">Choose a room</a>.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
